version = 1
unit = "roc_minor"
default_asset = "roc"
rounding = "floor"
remainder_sink = "treasury"

[accounts]
treasury = "t:default/treasury"
reward_pool = "t:default/reward_pool"
burn = "t:default/burn"

[roles]
site_owner = "dynamic:site_owner"
content_owner = "dynamic:content_owner"
storage_provider = "dynamic:storage_provider"
edge_provider = "dynamic:edge_provider"
app_owner = "dynamic:app_owner"
curator_pool = "dynamic:curator_pool"

[limits]
default_daily_spend_cap_minor = 100000
default_single_action_cap_minor = 10000
anonymous_daily_spend_cap_minor = 1000

[actions.paid_storage_put]
enabled = true
pricing_kind = "per_byte_plus_minimum"
price_per_byte_minor = 1
minimum_charge_minor = 70
max_spend_minor = 100000
max_hold_multiplier_bps = 12000

[[actions.paid_storage_put.splits]]
to = "storage_provider"
bps = 8000

[[actions.paid_storage_put.splits]]
to = "treasury"
bps = 1500

[[actions.paid_storage_put.splits]]
to = "reward_pool"
bps = 500

[actions.paid_storage_pin]
enabled = true
pricing_kind = "per_second_plus_minimum"
price_per_second_minor = 1
minimum_charge_minor = 10
max_spend_minor = 50000
max_hold_multiplier_bps = 12000

[[actions.paid_storage_pin.splits]]
to = "storage_provider"
bps = 7500

[[actions.paid_storage_pin.splits]]
to = "treasury"
bps = 1500

[[actions.paid_storage_pin.splits]]
to = "reward_pool"
bps = 1000

[actions.paid_content_view]
enabled = true
pricing_kind = "flat"
price_minor = 5
minimum_charge_minor = 5
max_spend_minor = 1000
max_hold_multiplier_bps = 10000

[[actions.paid_content_view.splits]]
to = "content_owner"
bps = 7000

[[actions.paid_content_view.splits]]
to = "curator_pool"
bps = 1000

[[actions.paid_content_view.splits]]
to = "edge_provider"
bps = 1000

[[actions.paid_content_view.splits]]
to = "treasury"
bps = 500

[[actions.paid_content_view.splits]]
to = "reward_pool"
bps = 500

[actions.paid_song_play]
enabled = true
pricing_kind = "flat"
price_minor = 2
minimum_charge_minor = 2
max_spend_minor = 1000
max_hold_multiplier_bps = 10000

[[actions.paid_song_play.splits]]
to = "content_owner"
bps = 8000

[[actions.paid_song_play.splits]]
to = "curator_pool"
bps = 1000

[[actions.paid_song_play.splits]]
to = "treasury"
bps = 500

[[actions.paid_song_play.splits]]
to = "reward_pool"
bps = 500

[actions.site_visit]
enabled = true
pricing_kind = "flat"
price_minor = 1
minimum_charge_minor = 1
max_spend_minor = 1000
max_hold_multiplier_bps = 10000

[[actions.site_visit.splits]]
to = "site_owner"
bps = 7000

[[actions.site_visit.splits]]
to = "app_owner"
bps = 1000

[[actions.site_visit.splits]]
to = "edge_provider"
bps = 1000

[[actions.site_visit.splits]]
to = "treasury"
bps = 500

[[actions.site_visit.splits]]
to = "reward_pool"
bps = 500