[package]
name = "ron-ledger"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
description = "Invariant-driven append-only ROC ledger library for RustyOnions"
license = "MIT OR Apache-2.0"
repository = "https://example.invalid/rustyonions"
readme = "README.md"

[features]
default = ["serde"]
serde = []
pq-hybrid = []
arbitrary = []
quickchain-preflight = ["dep:ron-proto"]

[dependencies]
base64 = "0.22"
blake3 = "1.5"
hex = "0.4"
parking_lot = "0.12"
ron-proto = { path = "../ron-proto", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.5"
tempfile = "3.15"

[[bench]]
name = "micro"
harness = false