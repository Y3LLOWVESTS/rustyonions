name: ci

on:
  push:
    paths:
      - "crates/svc-wallet/**"
      - "crates/ron-ledger/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "crates/svc-wallet/**"
      - "crates/ron-ledger/**"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.80.0
      - run: cargo fmt --all --check
      - run: cargo clippy -p svc-wallet --all-targets -- -D warnings
      - run: cargo test -p svc-wallet --all-targets