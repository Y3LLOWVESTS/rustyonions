name: render-mermaid

on:
  push:
    paths:
      - "crates/svc-wallet/docs/**/*.mmd"
  pull_request:
    paths:
      - "crates/svc-wallet/docs/**/*.mmd"

jobs:
  mmdc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g @mermaid-js/mermaid-cli
      - run: |
          for f in $(git ls-files 'crates/svc-wallet/docs/*.mmd'); do
            out="${f%.mmd}.svg"
            mmdc -i "$f" -o "$out"
          done